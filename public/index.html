<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentimental AI - 당신의 문장에서 감성을 읽습니다</title>
    <!-- Google Fonts: Apple의 SF Pro와 유사한 느낌을 주는 Inter 폰트를 사용합니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 전역 내비게이션 바 (Global Nav): Apple 스타일의 깔끔한 검은색 바입니다. -->
    <nav class="global-nav">
        <div class="nav-content">
            <span class="logo">Sentimental AI</span>
        </div>
    </nav>

    <main class="container">
        <!-- 히어로 섹션: 메인 타이틀과 입력창이 위치합니다. -->
        <section class="hero-section">
            <h1 class="main-title">Sentimental AI.</h1>
            <p class="subtitle">AI가 당신의 문장에 담긴 감정과 신뢰도를 분석합니다.</p>
            
            <div class="input-card">
                <!-- 텍스트 입력 영역: 테두리 없이 깔끔한 디자인을 지향합니다. -->
                <textarea id="text-input" placeholder="분석하고 싶은 문장을 입력하세요..." maxlength="500"></textarea>
                
                <div class="action-area">
                    <button id="analyze-btn" class="primary-btn">분석하기</button>
                </div>
            </div>
        </section>
    </main>

    <!-- 결과 모달 (Result Modal): 분석 결과를 보여주는 반투명한 창입니다. -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>분석 결과</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="sentiment-badge" id="sentiment-result">긍정</div>
                <div class="confidence-section">
                    <span class="label">신뢰도</span>
                    <div class="progress-bar">
                        <div id="confidence-bar" class="progress-fill" style="width: 0%;"></div>
                    </div>
                    <span id="confidence-text" class="value">0%</span>
                </div>
                <hr class="divider">
                <div class="reasoning-section">
                    <h3>분석 이유</h3>
                    <p id="reasoning-text">AI가 분석한 상세 이유가 여기에 표시됩니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 스크립트 파일 연결 (추후 작성 예정) -->
    <script src="app.js"></script>
</body>
</html>
